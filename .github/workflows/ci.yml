name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: task_manager
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - run: npm install
      - run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: task_manager
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci_test_secret

  frontend-tests-and-build:
    runs-on: ubuntu-latest
    # src/test/flow.test.jsx renders the real app and drives it against a
    # REAL running backend + Postgres (integration tests, not mocks), so
    # this job needs both services up before `npm test`, not just before
    # `npm run build`.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: task_manager
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install backend deps and start server
        working-directory: server
        run: |
          npm install
          nohup node src/server.js > /tmp/server.log 2>&1 &
          npx wait-on http://localhost:5000/api/health
        env:
          NODE_ENV: development
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: task_manager
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci_test_secret
          CLIENT_ORIGIN: http://localhost:5173

      - name: Install frontend deps
        working-directory: client
        run: npm install

      - name: Run frontend integration tests against the live backend
        working-directory: client
        run: npm test
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Production build
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Dump backend log on failure
        if: failure()
        run: cat /tmp/server.log || true
